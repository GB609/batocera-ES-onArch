<features>
  <sharedFeatures>
    <feature name="POWER MODE" value="powermode" group="POWER OPTIONS" prompt="POWER MODE" description="Adjust the cpu power frequency profile whilst in-game. Some systems will benefit from improved voltage handling.">
      <choice name="High Performance" value="highperformance" />
      <choice name="Balanced" value="balanced" />
      <choice name="Power Saver" value="powersaver" />
    </feature>
    <feature name="RYZEN THERMAL DESIGN POWER" value="tdp" archs_include="x86_64" group="POWER OPTIONS" prompt="RYZEN THERMAL DESIGN POWER" description="Adjust the percentage of power (watts) provided to a Ryzen Mobile Series CPU based on it's default max value. Caution, setting wattage too high could damage your device." preset="slider" preset_parameters="10 130 5 100 %">
    </feature>
    <feature name="VIDEO MODE" value="videomode" prompt="VIDEO MODE" description="Set the display's resolution. Does not affect the rendering resolution." preset="videomodes">
    </feature>
    <feature name="GAME ASPECT RATIO" value="ratio" prompt="GAME ASPECT RATIO" description="Force the game to render in this aspect ratio. Not all systems support all ratios.">
      <choice name="4/3" value="4/3" />
      <choice name="16/9" value="16/9" />
      <choice name="Full" value="full" />
      <choice name="16/10" value="16/10" />
      <choice name="16/15" value="16/15" />
      <choice name="21/9" value="21/9" />
      <choice name="1/1" value="1/1" />
      <choice name="2/1" value="2/1" />
      <choice name="3/2" value="3/2" />
      <choice name="3/4" value="3/4" />
      <choice name="4/1" value="4/1" />
      <choice name="9/16" value="9/16" />
      <choice name="5/4" value="5/4" />
      <choice name="6/5" value="6/5" />
      <choice name="7/9" value="7/9" />
      <choice name="8/3" value="8/3" />
      <choice name="8/7" value="8/7" />
      <choice name="19/12" value="19/12" />
      <choice name="19/14" value="19/14" />
      <choice name="30/17" value="30/17" />
      <choice name="32/9" value="32/9" />
      <choice name="Config" value="config" />
      <choice name="Square pixel" value="squarepixel" />
      <choice name="Core provided" value="core" />
      <choice name="Custom" value="custom" />
    </feature>
    <feature name="HEADS UP DISPLAY" value="hud" archs_exclude="s905 bcm2835 bcm2836" prompt="HEADS UP DISPLAY" description="Show context-sensitive info over the game." submenu="DECORATIONS">
      <choice name="None" value="none" />
      <choice name="Game info/art" value="game" />
      <choice name="Performance" value="perf" />
      <choice name="Custom" value="custom" />
    </feature>
    <feature name="HEADS UP DISPLAY CORNER" value="hud_corner" archs_exclude="s905 bcm2835 bcm2836" prompt="HEADS UP DISPLAY CORNER" submenu="DECORATIONS">
      <choice name="TOP LEFT (NW)" value="NW" />
      <choice name="TOP RIGHT (NE)" value="NE" />
      <choice name="BOTTOM RIGHT (SE)" value="SE" />
      <choice name="BOTTOM LEFT (SW)" value="SW" />
    </feature>
    <feature name="TATTOO CORNER" value="bezel.tattoo_corner" prompt="TATTOO CORNER" submenu="DECORATIONS">
      <choice name="TOP LEFT (NW)" value="NW" />
      <choice name="TOP RIGHT (NE)" value="NE" />
      <choice name="BOTTOM RIGHT (SE)" value="SE" />
      <choice name="BOTTOM LEFT (SW)" value="SW" />
    </feature>
    <feature name="THREADED VIDEO" value="video_threaded" submenu="LATENCY REDUCTION" prompt="THREADED VIDEO" description="Improves performance at the cost of latency and more video stuttering.">
      <choice name="On" value="1" />
      <choice name="Off" value="0" />
    </feature>
    <feature name="USE WHEELS" value="use_wheels" order="100" group="CONTROLS" submenu="WHEELS" prompt="USE WHEELS" description="Use wheels instead of pads if wheels are connected.">
      <choice name="On" value="1" />
      <choice name="Off" value="0" />
    </feature>
    <feature name="WHEEL ROTATION" value="wheel_rotation" order="100" group="CONTROLS" submenu="WHEELS" prompt="WHEEL ROTATION" description="Maximum wheel rotation from left to right (in degrees)">
      <choice name="150" value="150" />
      <choice name="180" value="180" />
      <choice name="200" value="200" />
      <choice name="240" value="240" />
      <choice name="270" value="270" />
      <choice name="360" value="360" />
      <choice name="720" value="720" />
      <choice name="900" value="900" />
      <choice name="1080" value="1080" />
    </feature>
    <feature name="WHEEL DEADZONE" value="wheel_deadzone" order="100" group="CONTROLS" submenu="WHEELS" prompt="WHEEL DEADZONE" description="Zone for which the game doesn't react to the wheel (in degrees)">
      <choice name="5" value="5" />
      <choice name="10" value="10" />
      <choice name="15" value="15" />
      <choice name="20" value="20" />
      <choice name="25" value="25" />
      <choice name="30" value="30" />
      <choice name="35" value="35" />
      <choice name="40" value="40" />
      <choice name="45" value="45" />
      <choice name="50" value="50" />
    </feature>
    <feature name="WHEEL MIDZONE" value="wheel_midzone" order="100" group="CONTROLS" submenu="WHEELS" prompt="WHEEL MIDZONE" description="Reserve a non dead zone at the center of the wheel to go straight ahead (in degrees)">
      <choice name="1" value="1" />
      <choice name="2" value="2" />
      <choice name="3" value="3" />
      <choice name="4" value="4" />
      <choice name="5" value="5" />
      <choice name="6" value="6" />
      <choice name="7" value="7" />
      <choice name="8" value="8" />
      <choice name="9" value="9" />
      <choice name="10" value="10" />
    </feature>
    <feature name="RUMBLE LEVEL" value="rumble_gain" prompt="RUMBLE LEVEL" description="For emulators and controllers supporting force feedback.">
      <choice name="disabled" value="1" />
      <choice name="20%" value="20" />
      <choice name="40%" value="40" />
      <choice name="60%" value="60" />
      <choice name="80%" value="80" />
      <choice name="100%" value="100" />
    </feature>
    <feature name="AUDIO VOLUME GAIN" value="audio_volume" prompt="AUDIO VOLUME GAIN" description="Set game audio level gain in dB.">
      <choice name="-12" value="-12" />
      <choice name="-10" value="-10" />
      <choice name="-8" value="-8" />
      <choice name="-6" value="-6" />
      <choice name="-4" value="-4" />
      <choice name="-2" value="-2" />
      <choice name="0 (No gain)" value="0" />
      <choice name="+2" value="2" />
      <choice name="+4" value="4" />
      <choice name="+6" value="6" />
      <choice name="+8" value="8" />
      <choice name="+10" value="10" />
      <choice name="+12" value="12" />
    </feature>
    <feature name="DXVK HUD" value="dxvk_hud" group="DXVK OPTIONS" prompt="DXVK HUD" description="See your FPS and version of Vulkan API/driver.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="FPS LIMITER" value="dxvk_fps_limit" group="DXVK OPTIONS" prompt="FPS LIMITER" description="Allows you to limit FPS to 60.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="ENABLE NVAPI" value="dxvk_enable_nvapi" group="DXVK OPTIONS" prompt="ENABLE NVAPI" description="NVAPI is NVIDIA's core software that allows direct access to NVIDIA GPU.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="DXVK RESET CACHE" value="dxvk_reset_cache" group="DXVK OPTIONS" prompt="DXVK RESET CACHE" description="Reset the cache can fix some crashes if your game was running under Batocera 29.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="FIDELITY FX SUPER RESOLUTION" value="dxvk_fsr" group="DXVK OPTIONS" prompt="FIDELITY FX SUPER RESOLUTION" description="Renders game at a lower res then upscales to increase FPS.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="MOUSE_HIDE" value="mouse_visibility" group="CONTROLS" prompt="MOUSE_HIDE" description="Hide the mouse pointer." preset="switch">
    </feature>
    <feature name="CONTROLLER_PROFILE" value="controller_profile1" order="10" group="CONTROLS" submenu="CONTROLLER 1" prompt="CONTROLLER_PROFILE" description="Enable/Disable controller input or configure keyboard mapping.
Activating any profile will block controller input to the game.">
      <choice name="Game (=do nothing)" value="none" />
      <choice name="Deactivate Controller" value="deactivated" />
      <choice name="Game-specific Antimicrox Profile" value="game_spec" />
      <choice name="System-specific Profile" value="system_spec" />
      <choice name="Emulator-specific Profile" value="emu_spec" />
      <choice name="Desktop Navigation" value="desktop" />
      <choice name="Generic Shooter" value="fps" />
      <choice name="Generic RPG" value="rpg" />
    </feature>
    <feature name="CONTROLLER_PROFILE" value="controller_profile2" order="10" group="CONTROLS" submenu="CONTROLLER 2" prompt="CONTROLLER_PROFILE" description="Enable/Disable controller input or configure keyboard mapping.
Activating any profile will block controller input to the game.">
      <choice name="Game (=do nothing)" value="none" />
      <choice name="Deactivate Controller" value="deactivated" />
      <choice name="Game-specific Antimicrox Profile" value="game_spec" />
      <choice name="System-specific Profile" value="system_spec" />
      <choice name="Emulator-specific Profile" value="emu_spec" />
      <choice name="Desktop Navigation" value="desktop" />
      <choice name="Generic Shooter" value="fps" />
      <choice name="Generic RPG" value="rpg" />
    </feature>
    <feature name="CONTROLLER_PROFILE" value="controller_profile3" order="10" group="CONTROLS" submenu="CONTROLLER 3" prompt="CONTROLLER_PROFILE" description="Enable/Disable controller input or configure keyboard mapping.
Activating any profile will block controller input to the game.">
      <choice name="Game (=do nothing)" value="none" />
