      <choice name="Game-specific Antimicrox Profile" value="game_spec" />
      <choice name="System-specific Profile" value="system_spec" />
      <choice name="Emulator-specific Profile" value="emu_spec" />
      <choice name="Desktop Navigation" value="desktop" />
      <choice name="Generic Shooter" value="fps" />
      <choice name="Generic RPG" value="rpg" />
    </feature>
    <feature name="CONTROLLER_PROFILE" value="controller_profile6" order="10" group="CONTROLS" submenu="CONTROLLER 6" prompt="CONTROLLER_PROFILE" description="Enable/Disable controller input or configure keyboard mapping.
Activating any profile will block controller input to the game.">
      <choice name="Game (=do nothing)" value="none" />
      <choice name="Deactivate Controller" value="deactivated" />
      <choice name="Game-specific Antimicrox Profile" value="game_spec" />
      <choice name="System-specific Profile" value="system_spec" />
      <choice name="Emulator-specific Profile" value="emu_spec" />
      <choice name="Desktop Navigation" value="desktop" />
      <choice name="Generic Shooter" value="fps" />
      <choice name="Generic RPG" value="rpg" />
    </feature>
    <feature name="CONTROLLER_PROFILE" value="controller_profile7" order="10" group="CONTROLS" submenu="CONTROLLER 7" prompt="CONTROLLER_PROFILE" description="Enable/Disable controller input or configure keyboard mapping.
Activating any profile will block controller input to the game.">
      <choice name="Game (=do nothing)" value="none" />
      <choice name="Deactivate Controller" value="deactivated" />
      <choice name="Game-specific Antimicrox Profile" value="game_spec" />
      <choice name="System-specific Profile" value="system_spec" />
      <choice name="Emulator-specific Profile" value="emu_spec" />
      <choice name="Desktop Navigation" value="desktop" />
      <choice name="Generic Shooter" value="fps" />
      <choice name="Generic RPG" value="rpg" />
    </feature>
    <feature name="CONTROLLER_PROFILE" value="controller_profile8" order="10" group="CONTROLS" submenu="CONTROLLER 8" prompt="CONTROLLER_PROFILE" description="Enable/Disable controller input or configure keyboard mapping.
Activating any profile will block controller input to the game.">
      <choice name="Game (=do nothing)" value="none" />
      <choice name="Deactivate Controller" value="deactivated" />
      <choice name="Game-specific Antimicrox Profile" value="game_spec" />
      <choice name="System-specific Profile" value="system_spec" />
      <choice name="Emulator-specific Profile" value="emu_spec" />
      <choice name="Desktop Navigation" value="desktop" />
      <choice name="Generic Shooter" value="fps" />
      <choice name="Generic RPG" value="rpg" />
    </feature>
  </sharedFeatures>
  <emulator name="sh" features="padtokeyboard">
    <sharedFeature value="powermode" />
    <sharedFeature value="tdp" />
    <sharedFeature value="videomode" />
    <sharedFeature value="bezel" />
    <sharedFeature value="bezel_stretch" />
    <sharedFeature value="hud" />
    <sharedFeature value="hud_corner" />
    <sharedFeature value="bezel.tattoo" />
    <sharedFeature value="bezel.tattoo_corner" />
    <sharedFeature value="bezel.tattoo_file" />
    <sharedFeature value="bezel.resize_tattoo" />
  </emulator>
  <emulator name="wine" features="padtokeyboard">
    <cores>
      <core name="umu">
        <sharedFeature value="dxvk_hud" />
        <sharedFeature value="dxvk_fps_limit" />
        <sharedFeature value="dxvk_fsr" />
        <sharedFeature value="dxvk_enable_nvapi" />
        <sharedFeature value="dxvk_reset_cache" />
        <feature name="ESYNC" value="esync" group="ADVANCED OPTIONS" prompt="ESYNC" description="Can increase performance for games that stress the CPU.">
          <choice name="Off" value="0" />
          <choice name="On" value="1" />
        </feature>
        <feature name="FSYNC" value="fsync" group="ADVANCED OPTIONS" prompt="FSYNC" description="Can improve frame rate and responsiveness.">
          <choice name="Off" value="0" />
          <choice name="On" value="1" />
        </feature>
      </core>
      <core name="dxvk">
        <sharedFeature value="dxvk_hud" />
        <sharedFeature value="dxvk_fps_limit" />
        <sharedFeature value="dxvk_fsr" />
        <sharedFeature value="dxvk_enable_nvapi" />
        <sharedFeature value="dxvk_reset_cache" />
        <feature name="DXVK FEATURE" value="dxvk" prompt="DXVK FEATURE" description="Allows to disable DXVK for debugging.">
          <choice name="On" value="1" />
          <choice name="Off" value="0" />
        </feature>
      </core>
    </cores>
    <sharedFeature value="powermode" />
    <sharedFeature value="tdp" />
    <sharedFeature value="videomode" />
    <feature name="ENABLE MOUSE" value="force_mouse" prompt="ENABLE MOUSE" description="Force mouse in games.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="SDL CONFIG" value="sdl_config" prompt="SDL CONFIG" description="Choose whether to pass SDL Game Controller config to the Windows game. Disabling may help with some games.">
      <choice name="Off" value="0" />
      <choice name="On (Default)" value="1" />
    </feature>
    <feature name="PBA" value="pba" group="ADVANCED OPTIONS" prompt="PBA" description="Vastly improves the speed of buffer maps.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="VIRTUAL DESKTOP" value="virtual_desktop" group="ADVANCED OPTIONS" prompt="VIRTUAL DESKTOP" description="Define the resolution and a new dedicated window.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="ENABLE XIM" value="allow_xim" group="ADVANCED OPTIONS" prompt="ENABLE XIM" description="Enable support for Chinese, Japanese and Korean input methods.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="NO WRITE WATCH" value="no_write_watch" group="ADVANCED OPTIONS" prompt="NO WRITE WATCH" description="Disable support for memory write watches in ntdll.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="FORCE LARGE ADDRESS" value="force_large_adress" group="ADVANCED OPTIONS" prompt="FORCE LARGE ADDRESS" description="Force WINE to run games with large addresses.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="HEAP DELAY FREE" value="heap_delay_free" group="ADVANCED OPTIONS" prompt="HEAP DELAY FREE" description="Delay freeing some memory.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="HIDE NVIDIA GPU" value="hide_nvidia_gpu" group="ADVANCED OPTIONS" prompt="HIDE NVIDIA GPU" description="Force Nvidia GPUs to always be reported as AMD GPUs to workaround game issues.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="ENABLE NTFS MODE" value="wine_ntfs" group="ADVANCED OPTIONS" prompt="ENABLE NTFS MODE" description="Enable this mode if you have issue for run your game on NTFS storage (by default is better to use LinuxFS).">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
    <feature name="ENABLE DEBUG" value="wine_debug" group="ADVANCED OPTIONS" prompt="ENABLE DEBUG" description="Useful to troubleshoot when your Windows game won't start of crashes.">
      <choice name="Off" value="0" />
      <choice name="On" value="1" />
    </feature>
  </emulator>
  <emulator name="xenia-canary" features="">
    <sharedFeature value="powermode" />
    <sharedFeature value="tdp" />
    <sharedFeature value="videomode" />
    <feature name="XBOX LIVE ARCADE" value="xenia_license" prompt="XBOX LIVE ARCADE" description="This option enables the ability to play Xbox Live Arcade games. May cause compatibility issues with non-XBLA games.">
      <choice name="No licenses enabled" value="0" />
      <choice name="XBLA license enabled (Default)" value="1" />
      <choice name="All possible licenses (Not recommended)" value="-1" />
    </feature>
    <feature name="INTERNAL DISPLAY RESOLUTION" value="xenia_resolution" prompt="INTERNAL DISPLAY RESOLUTION" description="Allow game that support different resolutions to be rendered in specific resolution.">
      <choice name="640x480" value="0" />
      <choice name="640x576" value="1" />
      <choice name="720x480" value="2" />
      <choice name="720x576" value="3" />
      <choice name="800x600" value="4" />
      <choice name="848x480" value="5" />
      <choice name="1024x768" value="6" />
