      <choice name="1280x960" value="10" />
      <choice name="1280x1024" value="11" />
      <choice name="1360x768" value="12" />
      <choice name="1440x900" value="13" />
      <choice name="1680x1050" value="14" />
      <choice name="1920x540" value="15" />
      <choice name="1920x1080" value="16" />
    </feature>
    <feature name="GRAPHICS API" value="xenia_api" prompt="GRAPHICS API" description="Choose which graphics API library to use. D3D12 may yield better results with faster GPUs.">
      <choice name="D3D12 (Default)" value="D3D12" />
      <choice name="Native Vulkan" value="Vulkan" />
    </feature>
    <feature name="VSYNC" value="xenia_vsync" prompt="VSYNC" description="Fix screen tearing. With Some games you need to turn VSync on in the games options.">
      <choice name="Disabled" value="False" />
      <choice name="Enabled" value="True" />
    </feature>
    <feature name="VSYNC FPS" value="xenia_vsync_fps" prompt="VSYNC FPS" description="Manually set VSYNC frames per second. Ideally this should match your monitor refresh rate.">
      <choice name="50fps" value="50" />
      <choice name="60fps" value="60" />
      <choice name="120fps" value="120" />
      <choice name="144fps" value="144" />
      <choice name="165fps" value="165" />
    </feature>
    <feature name="UI PROMPTS" value="xenia_headless" prompt="UI PROMPTS" description="Choose to display UI prompts or accept defaults.">
      <choice name="Enabled (Default)" value="False" />
      <choice name="Disabled" value="True" />
    </feature>
    <feature name="SHOW ACHIEVEMENT MESSAGES" value="xenia_achievement" prompt="SHOW ACHIEVEMENT MESSAGES" description="Choose to display achievement messages in the UI.">
      <choice name="Disabled" value="False" />
      <choice name="Enabled" value="True" />
    </feature>
