<?xml version="1.0"?>
<!-- Generated during PKGBUILD from git:batocera.linux:a0d3684e9716234df64b9b549b19923745cbbffe, git:batocera-emulationstation: b13128bb0719a9f58e6e1af2f88242077fdc5ed9
sources:
/opt/batocera-emulationstation/conf.d/es_systems.yml
/etc/batocera-emulationstation/conf.d/systems/00-supported_systems.json
/etc/batocera-emulationstation/conf.d/systems/01-custom-systems.json -->
<systemList>
  <system>
    <name>gba</name>
    <fullname>Game Boy Advance</fullname>
    <manufacturer>Nintendo</manufacturer>
    <release>2001</release>
    <hardware>portable</hardware>
    <path>%ROMSDIR%/gba</path>
    <extension>.gba .zip .7z</extension>
    <command>emulatorlauncher %CONTROLLERSCONFIG% -system %SYSTEM% -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME%</command>
    <platform>gba</platform>
    <theme>gba</theme>
    <emulators>
      <emulator name="libretro"><cores>
        <core>mgba</core>
        <core>vba-m</core>
        <core>gpsp</core>
      </cores></emulator>
    </emulators>
  </system>
  <system>
    <name>ports</name>
    <fullname>Ports</fullname>
    <manufacturer>Ports</manufacturer>
    <release>None</release>
    <hardware>port</hardware>
    <path>%ROMSDIR%/ports</path>
    <extension>.sh .squashfs</extension>
    <command>emulatorlauncher %CONTROLLERSCONFIG% -system %SYSTEM% -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME%</command>
    <platform>pc</platform>
    <theme>ports</theme>
    <emulators>
      <emulator name="sh"><cores>
        <core>sh</core>
      </cores></emulator>
    </emulators>
  </system>
  <system>
    <name>ps2</name>
    <fullname>PlayStation 2</fullname>
    <manufacturer>Sony</manufacturer>
    <release>2000</release>
    <hardware>console</hardware>
    <path>%ROMSDIR%/ps2</path>
    <extension>.iso .mdf .nrg .bin .img .dump .gz .cso .chd .m3u</extension>
    <command>emulatorlauncher %CONTROLLERSCONFIG% -system %SYSTEM% -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME%</command>
    <platform>ps2</platform>
    <theme>ps2</theme>
    <emulators>
      <emulator name="pcsx2"><cores>
        <core>pcsx2</core>
      </cores></emulator>
      <emulator name="libretro"><cores>
        <core>pcsx2</core>
        <core>play</core>
      </cores></emulator>
      <emulator name="play"><cores>
        <core>play</core>
      </cores></emulator>
    </emulators>
  </system>
  <system>
    <name>windows</name>
    <fullname>Windows</fullname>
    <manufacturer>Microsoft</manufacturer>
    <release>1992</release>
    <hardware>computer</hardware>
    <path>%ROMSDIR%/windows</path>
    <extension>.wine .pc .squashfs .wsquashfs .iso .nrg .img .mdf .zip .tgz .wtgz .exe .msi .application</extension>
    <command>emulatorlauncher %CONTROLLERSCONFIG% -system %SYSTEM% -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME%</command>
    <platform>pc</platform>
    <theme>windows</theme>
    <emulators>
      <emulator name="wine"><cores>
        <core>regular</core>
        <core>dxvk</core>
        <core>umu</core>
      </cores></emulator>
    </emulators>
  </system>
  <system>
    <name>windows_installers</name>
    <fullname>Install a new Windows game</fullname>
    <manufacturer>Microsoft</manufacturer>
    <release>1992</release>
    <hardware>computer</hardware>
    <path>%ROMSDIR%/windows_installers</path>
    <extension>.iso .nrg .img .mdf .zip .tgz .wtgz .exe .msi .application</extension>
    <command>emulatorlauncher %CONTROLLERSCONFIG% -system %SYSTEM% -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME%</command>
    <platform>pc</platform>
    <theme>windows_installers</theme>
    <emulators>
      <emulator name="wine"><cores>
        <core>regular</core>
        <core>umu</core>
      </cores></emulator>
    </emulators>
  </system>
  <system>
    <name>xbox</name>
    <fullname>Xbox</fullname>
    <manufacturer>Microsoft</manufacturer>
    <release>2003</release>
    <hardware>console</hardware>
    <path>%ROMSDIR%/xbox</path>
    <extension>.iso .squashfs</extension>
    <command>emulatorlauncher %CONTROLLERSCONFIG% -system %SYSTEM% -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME%</command>
    <platform>xbox</platform>
    <theme>xbox</theme>
    <emulators>
      <emulator name="xemu"><cores>
        <core>xemu</core>
      </cores></emulator>
    </emulators>
  </system>
  <system>
    <name>xbox360</name>
    <fullname>Xbox 360</fullname>
    <manufacturer>Microsoft</manufacturer>
    <release>2005</release>
    <hardware>console</hardware>
    <path>%ROMSDIR%/xbox360</path>
    <extension>.iso .xex .xbox360 .zar</extension>
    <command>emulatorlauncher %CONTROLLERSCONFIG% -system %SYSTEM% -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME%</command>
    <platform>xbox360</platform>
    <theme>xbox360</theme>
    <emulators>
      <emulator name="xenia"><cores>
        <core>xenia</core>
      </cores></emulator>
      <emulator name="xenia-canary"><cores>
        <core>xenia-canary</core>
      </cores></emulator>
    </emulators>
  </system>
</systemList>
